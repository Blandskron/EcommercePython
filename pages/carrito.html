<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito | TIENDA PRO</title>

    <link rel="stylesheet" href="../uxui/CSS/styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body {
            background: #f4f6f8;
            font-family: 'Segoe UI', sans-serif;
        }
        .cart-item {
            border-radius: 14px;
            transition: 0.3s;
        }
        .cart-item:hover {
            transform: scale(1.01);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark sticky-top">
    <div class="container d-flex justify-content-between align-items-center">

        <span class="navbar-brand fw-bold">
            TIENDA<span class="text-primary">PRO</span>
        </span>

        <div class="d-flex gap-3">
            <a href="../uxui/index.html" class="text-white text-decoration-none">Inicio</a>
        </div>

        <div>
            <i class="fas fa-shopping-cart text-white fs-4"></i>
        </div>

    </div>
</nav>

<!-- CONTENIDO -->
<main class="container py-5">

    <h1 class="fw-bold mb-4">🛒 Tu Carrito</h1>

    <!-- Aquí se renderizan los productos -->
    <div id="carrito"></div>

    <div class="bg-white p-4 rounded mt-4 shadow text-end">
        <h2 id="total" class="fw-bold fs-5">Total: $0</h2>
        <button id="pagarBtn" class="btn btn-primary mt-3">
            Pagar ahora
        </button>
    </div>

</main>

<!-- FOOTER -->
<footer class="footer">
    <h3 class="footer-titulo">TIENDA<span style="color:#3b82f6">PRO</span></h3>
    <p class="footer-texto">Tecnología premium con diseño moderno</p>
    <div class="footer-links">
        <a href="../uxui/index.html">Inicio</a>
        <a href="#">Quiénes somos</a>
        <a href="#">Productos</a>
    </div>
    <p class="footer-copy">© 2026 E-Commerce Pro</p>
</footer>

<!-- ✅ Bootstrap JS primero, luego carrito.js -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../static/js/carrito.js"></script>

</body>
</html>
