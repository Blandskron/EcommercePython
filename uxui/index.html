<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Pro</title>

    <!-- CSS PROPIO -->
    <link rel="stylesheet" href="CSS/styles.css">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>

        body {
            background: #f4f6f8;
            font-family: 'Segoe UI', sans-serif;
        }

        /* HERO */
        .hero-section {
            background: linear-gradient(135deg, #1f2937, #111827);
            color: white;
            padding: 80px 0;
        }

        /* PRODUCT CARD */
        .product-card {
            border: none;
            border-radius: 14px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* HOVER CARD */
        .product-card:hover {
            transform: translateY(-12px) scale(1.02);
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
        }

        /* IMAGEN */
        .img-container {
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            position: relative;
        }

        .img-container img {
            max-width: 80%;
            max-height: 80%;
            object-fit: contain;
            transition: transform 0.4s ease;
        }

        .product-card:hover img {
            transform: scale(1.1);
        }

        .img-container::after {
            content: "";
            position: absolute;
            inset: 0;
            box-shadow: inset 0 -40px 60px rgba(0,0,0,0.2);
            opacity: 0;
            transition: 0.3s;
        }

        .product-card:hover .img-container::after {
            opacity: 1;
        }

        /* BOTONES BASE */
        .btn-primary {
            background: #2563eb;
            border: none;
        }

        .btn-primary:hover {
            background: #1d4ed8;
        }

    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark bg-dark sticky-top">
        <div class="container d-flex justify-content-between align-items-center">

            <!-- LOGO -->
            <span class="navbar-brand fw-bold">
                TIENDA<span class="text-primary">PRO</span>
            </span>

            <!-- 🔗 LINKS -->
            <div class="d-flex align-items-center gap-3">

                <a href="#" class="text-white text-decoration-none">Inicio</a>
                <a href="#" class="text-white text-decoration-none">Quiénes somos</a>

                <!-- 🔽 DROPDOWN -->
                <div class="dropdown">
                    <button class="btn btn-outline-light dropdown-toggle" data-bs-toggle="dropdown">
                        Productos
                    </button>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="#">Smartphones</a></li>
                        <li><a class="dropdown-item" href="#">Audífonos</a></li>
                    </ul>
                </div>

            </div>

            <!-- 🔍 BUSCADOR -->
            <div class="position-relative w-25">

            <input 
                type="text" 
                id="searchInput"
                class="form-control"
                placeholder="Buscar productos..."
                autocomplete="off"
            >

            <!-- 🔽 RESULTADOS -->
            <div id="searchResults" class="list-group position-absolute w-100" style="z-index:1000;"></div>

        </div>
    </nav>

    <!-- HERO -->
    <header class="hero-section text-center">
        <div class="container">
            <h1 class="fw-bold display-4">Tecnología con estilo</h1>
            <p class="lead">Productos premium con diseño moderno</p>
            <button class="btn btn-primary btn-lg">Comprar ahora</button>
        </div>
    </header>

    <!-- PRODUCTOS -->
    <main class="max-w-7xl mx-auto px-4 py-10">

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">

        <!-- SMARTPHONE -->
        <div class="card product-card text-center p-3" data-name="smartphone pro max celular telefono">

            <div class="img-container">
                <img src="img/smartphone.png" alt="Smartphone">
            </div>

            <div class="card-body">
                <h5>Smartphone Pro Max</h5>
                <p class="text-muted small">Electrónica</p>
                <p class="fw-bold fs-5">$599.990</p>

                <button class="btn btn-outline-primary w-100 add-cart">Añadir</button>
            </div>

        </div>

        <!-- AUDIFONOS -->
        <div class="card product-card text-center p-3" data-name="audifonos noise cancel audio musica headset">

            <div class="img-container">
                <img src="img/audifonos.png" alt="Audifonos">
            </div>

            <div class="card-body">
                <h5>Audífonos Noise Cancel</h5>
                <p class="text-muted small">Audio</p>
                <p class="fw-bold fs-5">$129.900</p>

                <button class="btn btn-outline-primary w-100 add-cart">Añadir</button>
            </div>

        </div>

        </div>
    </main>

    <!-- FOOTER -->
    <footer class="bg-dark text-white text-center py-4">
        <p>© 2026 E-Commerce Pro</p>
    </footer>

    <!-- JS -->
    <script>

        function ejecutarBusqueda(valor) {

            let texto = valor.toLowerCase();

            $(".product-card").each(function () {

                let nombre = $(this).data("name");

                if (nombre.includes(texto)) {
                    $(this).show();
                } else {
                    $(this).hide();
                }

            });

        }

        // 🔍 BUSCAR AL PRESIONAR ENTER
        $("#searchInput").on("keydown", function(e) {

            if (e.key === "Enter") {
                e.preventDefault();

                let valor = $(this).val();
                ejecutarBusqueda(valor);

                $("#searchResults").hide();
            }

        });

        // 🔽 AUTOCOMPLETE
        $("#searchInput").on("keyup", function() {

            let input = $(this).val().toLowerCase();
            let resultados = "";

            $(".product-card").each(function () {

                let nombre = $(this).data("name");
                let id = $(this).attr("id");

                if (nombre.includes(input) && input !== "") {

                    resultados += `
                        <div class="list-group-item item-busqueda" data-id="${id}">
                            ${nombre}
                        </div>
                    `;
                }

            });

            $("#searchResults").html(resultados).show();

        });

        // CLICK EN OPCIÓN
        $(document).on("click", ".item-busqueda", function(e) {

            e.preventDefault();

            let texto = $(this).text().trim().toLowerCase();

            // 🔥 mantener texto alineado y limpio
            $("#searchInput")
                .val(texto)
                .blur(); // evita re-render raro

            ejecutarBusqueda(texto);

            $("#searchResults").hide();

        });

    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/dist/bootstrap.bundle.min.js"></script>
</body>
</html>
