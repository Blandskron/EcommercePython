<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Pro</title>

    <link rel="stylesheet" href="CSS/styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body {
            background: #f4f6f8;
            font-family: 'Segoe UI', sans-serif;
        }
        .hero-section {
            background: linear-gradient(135deg, #1f2937, #111827);
            color: white;
            padding: 80px 0;
        }
        .product-card {
            border: none;
            border-radius: 14px;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .product-card:hover {
            transform: translateY(-12px) scale(1.02);
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
        }
        .img-container {
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
        }
        .img-container img {
            max-width: 80%;
            max-height: 80%;
            object-fit: contain;
        }
        .btn-primary {
            background: #2563eb;
            border: none;
        }
        .btn-primary:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark sticky-top">
    <div class="container d-flex justify-content-between align-items-center">

        <span class="navbar-brand fw-bold">
            TIENDA<span class="text-primary">PRO</span>
        </span>

        <div class="d-flex align-items-center gap-3">
            <a href="#" class="text-white text-decoration-none">Inicio</a>
            <a href="#" class="text-white text-decoration-none">Quiénes somos</a>

            <div class="dropdown">
                <button class="btn btn-outline-light dropdown-toggle" data-bs-toggle="dropdown">
                    Productos
                </button>
                <ul class="dropdown-menu">
                    <li><a class="dropdown-item" href="#">Smartphones</a></li>
                    <li><a class="dropdown-item" href="#">Audífonos</a></li>
                </ul>
            </div>

            <!-- BUSCADOR -->
            <div class="position-relative">
                <input id="searchInput"
                       type="text"
                       class="form-control"
                       placeholder="Buscar producto...">
                <div id="searchResults"
                     class="list-group position-absolute w-100"
                     style="z-index:999; display:none;">
                </div>
            </div>
        </div>

        <!-- CARRITO -->
        <a href="../pages/carrito.html" class="btn btn-primary position-relative">
            🛒 Carrito
            <span id="contadorCarrito"
                  class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                0
            </span>
        </a>

    </div>
</nav>

<!-- HERO -->
<header class="hero-section text-center">
    <div class="container">
        <h1 class="fw-bold display-4">Tecnología con estilo</h1>
        <p class="lead">Productos premium con diseño moderno</p>
        <button class="btn btn-primary btn-lg">Comprar ahora</button>
    </div>
</header>

<!-- PRODUCTOS -->
<main class="container py-5">
    <div id="contenedorProductos" class="row row-cols-1 row-cols-sm-2 row-cols-lg-4 g-4">
    </div>
</main>

<!-- FOOTER -->
<footer class="footer">
    <h3 class="footer-titulo">TIENDA<span style="color:#3b82f6">PRO</span></h3>
    <p class="footer-texto">Tecnología premium con diseño moderno</p>
    <div class="footer-links">
        <a href="#">Inicio</a>
        <a href="#">Quiénes somos</a>
        <a href="#">Productos</a>
    </div>
    <p class="footer-copy">© 2026 E-Commerce Pro</p>
</footer>

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script>
fetch("http://127.0.0.1:5000/productos")
  .then(res => res.json())
  .then(data => {
    let contenedor = document.getElementById("contenedorProductos");
    contenedor.innerHTML = "";

    data.forEach(producto => {
      contenedor.innerHTML += `
        <div class="col">
          <div class="card product-card text-center p-3 h-100"
               data-name="${producto.nombre.toLowerCase()}">
              <div class="img-container">
                  <img src="img/smartphone.png" alt="${producto.nombre}">
              </div>
              <div class="card-body">
                  <h5>${producto.nombre}</h5>
                  <p class="fw-bold fs-5">$${producto.precio.toLocaleString("es-CL")}</p>
                  <button class="btn btn-outline-primary w-100 add-cart"
                      data-nombre="${producto.nombre}"
                      data-precio="${producto.precio}"
                      data-imagen="img/smartphone.png">
                      Añadir
                  </button>
              </div>
          </div>
        </div>
      `;
    });
  })
  .catch(error => console.error("Error al cargar productos:", error));
</script>

<script src="../static/js/main.js"></script>

</body>
</html>
